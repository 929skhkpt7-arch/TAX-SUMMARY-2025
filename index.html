
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Armchair Income Lounge 2025 ETF and fund tax treatment table.">
  <title>2025 ETF &amp; Fund Tax Treatment Table</title>
  <style>
    :root {
      --black: #111111;
      --ink: #181818;
      --paper: #ffffff;
      --page: #f7f7f4;
      --line: #353535;
      --faint-yellow: #fff9d6;
      --focus: #d6a700;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--page);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 18px;
      line-height: 1.4;
    }
    button, input, select { font: inherit; }
    :focus-visible { outline: 4px solid var(--focus); outline-offset: 2px; }
    .wrap { width: min(2000px, calc(100% - 1rem)); margin: 0 auto; }
    header { background: var(--black); color: #fff; padding: 1.35rem 0; }
    h1 { margin: 0; font-size: clamp(1.75rem, 3vw, 2.55rem); line-height: 1.15; }
    header p { margin: .45rem 0 0; color: #fff; }
    main { padding: 1rem 0 2.5rem; }
    .notice {
      margin-bottom: 1rem;
      background: var(--faint-yellow);
      border-left: 7px solid var(--black);
      padding: .75rem 1rem;
      font-weight: 700;
    }
    .controls {
      display: grid;
      grid-template-columns: minmax(260px, 2fr) minmax(200px, 1fr) auto auto auto;
      gap: .75rem;
      align-items: end;
      background: var(--paper);
      border: 2px solid var(--line);
      border-radius: .6rem;
      padding: 1rem;
      margin-bottom: .85rem;
    }
    label { display: block; font-weight: 800; margin-bottom: .25rem; }
    input, select, button {
      min-height: 52px;
      border: 2px solid var(--black);
      border-radius: .45rem;
      padding: .55rem .75rem;
      background: #fff;
      color: var(--ink);
    }
    input, select { width: 100%; }
    button { cursor: pointer; font-weight: 800; color: var(--black); border-color: var(--black); }
    button.primary { background: var(--black); color: #fff; }
    button:hover { background: var(--faint-yellow); }
    button.primary:hover { background: #333; }
    .results-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: .75rem;
      margin: .7rem 0;
      font-weight: 800;
    }
    .table-wrap {
      overflow: visible;
      max-height: none;
      background: #fff;
      border: 2px solid var(--black);
      border-radius: .45rem;
    }
    table { border-collapse: separate; border-spacing: 0; table-layout: fixed; width: 100%; min-width: 0; font-size: 15px; }
    caption { text-align: left; padding: .75rem; font-weight: 800; color: var(--black); }
    th, td {
      padding: .68rem .6rem;
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      text-align: right;
      white-space: normal;
      background: #fff;
      overflow-wrap: break-word;
    }
    th {
      position: sticky;
      top: 0;
      z-index: 3;
      background: var(--black);
      color: #fff;
      text-align: center;
      white-space: normal;
      line-height: 1.2;
    }
    th:first-child, td:first-child {
      text-align: left;
      font-weight: 900;
    }
    th:first-child { width: 7%; background: var(--black); }
    th:nth-child(2), td:nth-child(2) {
      text-align: left;
    }
    th:nth-child(2) { width: 11%; background: var(--black); }
    tr:nth-child(even) td,
    tr:nth-child(even) td:first-child,
    tr:nth-child(even) td:nth-child(2) { background: var(--faint-yellow); }
    .empty { padding: 2rem; text-align: center; font-weight: 800; }
    footer { padding: 1rem 0 2rem; color: #4e5d69; }

    @media (max-width: 980px) {
      .controls { grid-template-columns: 1fr 1fr; }
      .controls button { width: 100%; }
    }
    @media (max-width: 620px) {
      body { font-size: 16px; }
      .wrap { width: calc(100% - .4rem); }
      .controls { grid-template-columns: 1fr; }
      header p { display: none; }
      table { font-size: 10px; }
      th, td { padding: .4rem .18rem; }
    }
    @page { size: landscape; margin: .35in; }
    @media print {
      body { background: #fff; font-size: 8pt; }
      header { background: #fff; color: #000; padding: 0 0 .12in; }
      h1 { font-size: 15pt; }
      header p, .notice, .controls, .results-bar, footer { display: none !important; }
      main { padding: 0; }
      .wrap { width: 100%; max-width: none; }
      .table-wrap { overflow: visible; max-height: none; border: 0; }
      table { min-width: 0; width: 100%; font-size: 6.8pt; }
      caption { display: none; }
      th, td {
        position: static !important;
        min-width: 0 !important;
        padding: 2.5pt 2pt;
        white-space: normal;
        color: #000;
        border-color: #777;
      }
      th { background: #111 !important; color: #fff !important; }
      tr:nth-child(even) td { background: #fff9d6 !important; }
    }
  </style>

  <script>
    (() => {
      const data = JSON.parse(document.getElementById('databaseData').textContent);
      const search = document.getElementById('search');
      const showFilter = document.getElementById('showFilter');
      const resultCount = document.getElementById('resultCount');
      const tableResults = document.getElementById('tableResults');

      const columns = [
        ['symbol', 'Symbol'],
        ['buyDate', 'Buy Date'],
        ['roc', 'ROC'],
        ['qdi', 'Qualified Dividend'],
        ['nq', 'Non-Qualified Dividend'],
        ['ltcg', 'Long-Term Gain'],
        ['stcg', 'Short-Term Gain'],
        ['ordinary', 'Ordinary Income'],
        ['section199a', 'Section 199A'],
        ['foreignTax', 'Foreign Tax Paid'],
        ['taxExempt', 'Federal Tax-Exempt']
      ];

      function escapeHtml(value) {
        return String(value ?? '').replace(/[&<>'"]/g, character => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', "'":'&#39;', '"':'&quot;' }[character]));
      }

      function formatValue(key, value) {
        if (value === null || value === undefined) return '—';
        if (typeof value === 'string') return value;
        return (value * 100).toLocaleString(undefined, { maximumFractionDigits: 2 }) + '%';
      }

      function filteredRows() {
        const term = search.value.trim().toUpperCase();
        const show = showFilter.value;
        return data.rows.filter(row => {
          const isNew = row.status.startsWith('Added');
          const matchesSymbol = !term || row.symbol.toUpperCase().includes(term);
          const matchesType = show === 'all' || (show === 'new' && isNew) || (show === 'existing' && !isNew);
          return matchesSymbol && matchesType;
        });
      }

      function render() {
        const rows = filteredRows();
        resultCount.textContent = 'Showing ' + rows.length + (rows.length === 1 ? ' record' : ' records');
        if (!rows.length) {
          tableResults.innerHTML = '<div class="empty">No matching symbols. Select Clear to see all rows.</div>';
          return;
        }
        const headers = columns.map(([, label]) => '<th scope="col">' + escapeHtml(label) + '</th>').join('');
        const body = rows.map(row => {
          const isNew = row.status.startsWith('Added');
          const cells = columns.map(([key]) => {
            const value = formatValue(key, row[key]);
            return '<td>' + escapeHtml(value) + '</td>';
          }).join('');
          return '<tr class="' + (isNew ? 'added' : '') + '">' + cells + '</tr>';
        }).join('');
        tableResults.innerHTML = '<table><caption>Tax treatment database</caption><thead><tr>' + headers + '</tr></thead><tbody>' + body + '</tbody></table>';
      }

      search.addEventListener('input', render);
      showFilter.addEventListener('change', render);
      document.getElementById('clearFilters').addEventListener('click', () => {
        search.value = '';
        showFilter.value = 'all';
        render();
        search.focus();
      });
      document.getElementById('openPdf').addEventListener('click', () => {
        window.location.href = '../../output/pdf/Armchair_Income_Tax_Treatment_2025_Portrait_One_Page.pdf';
      });
      document.getElementById('downloadExcel').addEventListener('click', () => {
        window.location.href = '../armchair_tax_database_2025/Armchair_Income_Tax_Treatment_Database_2025.xlsx';
      });

      render();
    })();
  </script>
</body>
</html>
